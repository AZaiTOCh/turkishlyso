[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tokenish"
version = "0.2.0"
description = "Local token optimizer daemon — Ollama-simple install"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
  "python-multipart>=0.0.9",
  "pypdf>=5.0.0",
  "openpyxl>=3.1.0",
  "python-docx>=1.1.0",
  "tiktoken>=0.7.0",
  "pillow>=10.0.0",
  "numpy>=1.26.0",
  "httpx>=0.27.0",
  "pydantic>=2.0.0",
  "pydantic-settings>=2.0.0",
  "faiss-cpu>=1.8.0",
]

[project.optional-dependencies]
ocr = ["pytesseract>=0.3.10", "opencv-python-headless>=4.8.0"]
dev = ["pytest>=8.0.0", "pytest-asyncio>=0.23.0", "pyinstaller>=6.0.0"]
all = ["tokenish[ocr,dev]"]

[project.scripts]
tokenish = "tokenish_engine.cli:main"
tokenish-engine = "tokenish_engine.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["tokenish_engine*"]

[tool.setuptools.package-data]
tokenish_engine = ["static/*", "routing.json"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
