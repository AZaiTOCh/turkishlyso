<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tokenish</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar history-sidebar">
      <div class="brand">
        <h1>tokenish</h1>
        <span>token use optimizer · v0.2</span>
      </div>
      <button class="btn primary full" id="newChat" type="button">new chat</button>
      <div class="section-label">history</div>
      <div class="thread-list" id="threadList"></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="tokex-panel" id="tokexPanel">
          <div class="tokex-big" id="tokexSaved">Saved Tokens 0%</div>
          <div class="tokex-sub" id="tokexScope">lifetime grand total · all chats</div>
          <div class="tokex-grid">
            <div><span class="k">before</span><span id="tokexTotal">0</span></div>
            <div><span class="k">after</span><span id="tokexRun">0</span></div>
            <div><span class="k">saved</span><span id="tokexPct">0 (0%)</span></div>
          </div>
          <div class="tokex-meta" id="tokexWeighted" hidden></div>
          <div class="tokex-sends" id="tokexSends" hidden></div>
        </div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="composer">
        <div class="attachments" id="attachments"></div>
        <div class="error" id="error" hidden></div>
        <div class="row">
          <button class="btn" id="attachBtn">attach</button>
          <input id="fileInput" type="file" multiple hidden accept=".pdf,.docx,.doc,.xlsx,.xls,.csv,.txt,.md,.json,.png,.jpg,.jpeg,.webp" />
          <textarea id="prompt" placeholder="message tokenish..."></textarea>
          <button class="btn primary" id="sendBtn">send</button>
        </div>
      </div>
    </main>

    <aside class="sidebar settings-sidebar">
      <div class="section-label">provider</div>
      <select id="provider">
        <option value="auto">auto</option>
        <option value="gemini">gemini</option>
        <option value="openrouter">openrouter</option>
        <option value="groq">groq</option>
      </select>
      <div class="section-label">model</div>
      <select id="model">
        <option value="gemini-3.5-flash">gemini-3.5-flash</option>
        <option value="openrouter/free">openrouter/free</option>
      </select>
      <div class="section-label">API keys</div>
      <label class="tiny">Gemini</label>
      <input id="sideKeyGemini" type="password" placeholder="GEMINI_API_KEY" autocomplete="off" />
      <label class="tiny">OpenRouter</label>
      <input id="sideKeyOpenRouter" type="password" placeholder="OPENROUTER_API_KEY" autocomplete="off" />
      <button class="btn" id="sideKeySave" type="button">save keys</button>
      <div class="section-label">status</div>
      <div class="provider-list" id="providers"></div>
      <div class="section-label">pdf page range</div>
      <input id="pageRange" type="text" placeholder="e.g. 12-15" />
    </aside>
  </div>
  <div id="keyModal" class="modal" hidden>
    <div class="modal-card">
      <h2>set up API keys</h2>
      <p>Paste Gemini and/or OpenRouter. Saved under <code>~/.tokenish</code>.</p>
      <label>Gemini API key</label>
      <input id="keyGemini" type="password" placeholder="GEMINI_API_KEY" autocomplete="off" />
      <label>OpenRouter key (optional)</label>
      <input id="keyOpenRouter" type="password" placeholder="OPENROUTER_API_KEY" autocomplete="off" />
      <div id="keyModalMsg" class="error" hidden></div>
      <div class="modal-actions">
        <button class="btn" id="keySkip" type="button">skip for now</button>
        <button class="btn primary" id="keySave" type="button">save & continue</button>
      </div>
    </div>
  </div>
  <script src="/ui/app.js"></script>
</body>
</html>
